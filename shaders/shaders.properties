##############################################################################
# Ultra Realistic Iris Shader - IntirationsT Inspired
##############################################################################

# Shader Display Name
screen=<#FFD700>━━━ Ultra Realistic Shader ━━━ $VERSION $COMMIT

# Version
VERSION=1.0.0
COMMIT=Ultra

##############################################################################
# SHADOW & LIGHTING SETTINGS
##############################################################################

screen.shadow=<#FFD700>━━━ SHADOW SETTINGS ━━━

# Shadow Distance (in chunks)
sliders.shadowDistance=32:8:256:8
option.shadowDistance.comment=Shadow render distance in chunks (higher = better shadows, more performance impact)

# Shadow Map Resolution
sliders.shadowMapResolution=2048:512:4096:512
option.shadowMapResolution.comment=Shadow map texture resolution (higher = sharper shadows)

# Shadow Samples (Soft Shadows)
sliders.shadowSamples=16:4:64:4
option.shadowSamples.comment=Shadow sampling quality (higher = smoother shadow edges)

# Shadow Bias
sliders.shadowBias=0.05:0.01:0.2:0.01
option.shadowBias.comment=Shadow depth bias (prevents shadow artifacts)

##############################################################################
# LIGHTING & REFLECTIONS
##############################################################################

screen.lighting=<#FFD700>━━━ LIGHTING SETTINGS ━━━

# Global Illumination Quality
sliders.giQuality=1.0:0.5:2.0:0.1
option.giQuality.comment=Global illumination quality (affects overall lighting realism)

# Ambient Occlusion Strength
sliders.aoStrength=1.0:0.0:2.0:0.1
option.aoStrength.comment=Ambient occlusion intensity

# Block Light Strength
sliders.blockLightStrength=1.0:0.5:1.5:0.1
option.blockLightStrength.comment=Artificial light (torches, lamps) intensity

# Sky Light Strength
sliders.skyLightStrength=1.0:0.5:1.5:0.1
option.skyLightStrength.comment=Natural sky light intensity

##############################################################################
# WATER SETTINGS
##############################################################################

screen.water=<#FFD700>━━━ WATER SETTINGS ━━━

# Water Shadow Disable (NO shadows on water)
option.waterShadowDisable=true
option.waterShadowDisable.comment=Disable shadows on water surfaces (shadow-free water)

# Water Caustics
option.waterCaustics=true
option.waterCaustics.comment=Underwater caustics effect

# Water Reflection Quality
sliders.waterReflectionQuality=1.0:0.5:2.0:0.1
option.waterReflectionQuality.comment=Water reflection quality (higher = more realistic reflections)

# Underwater Fog Distance
sliders.underwaterFogDistance=32:8:128:8
option.underwaterFogDistance.comment=Underwater visibility distance

##############################################################################
# RAIN SETTINGS
##############################################################################

screen.rain=<#FFD700>━━━ RAIN SETTINGS ━━━

# Rain Quality
sliders.rainQuality=1.0:0.5:2.0:0.1
option.rainQuality.comment=Rain rendering quality and density

# Rain Splash Effect
option.rainSplash=true
option.rainSplash.comment=Enable rain splash effects on surfaces

# Puddle Reflection
option.puddleReflection=true
option.puddleReflection.comment=Enable puddle reflections during rain

# Rain Sound Effect
option.rainSound=true
option.rainSound.comment=Enable rain ambient sound

##############################################################################
# PERFORMANCE SETTINGS
##############################################################################

screen.performance=<#FFD700>━━━ PERFORMANCE SETTINGS ━━━

# Render Distance Limit
option.limitRenderDistance=true
option.limitRenderDistance.comment=Limit render distance for better performance

# Dynamic Resolution
sliders.dynamicResolution=1.0:0.5:1.0:0.1
option.dynamicResolution.comment=Dynamic resolution scaling for smooth gameplay

# Temporal Anti-Aliasing
option.taa=true
option.taa.comment=Temporal anti-aliasing for smoother visuals

# Motion Blur
sliders.motionBlur=0.0:0.0:0.3:0.05
option.motionBlur.comment=Motion blur strength (0.0 = disabled)

##############################################################################
# VISUAL ENHANCEMENTS
##############################################################################

screen.visual=<#FFD700>━━━ VISUAL ENHANCEMENTS ━━━

# Bloom Strength
sliders.bloomStrength=0.5:0.0:2.0:0.1
option.bloomStrength.comment=Bloom/glow effect intensity

# Color Grading
option.colorGrading=true
option.colorGrading.comment=Enable color grading for cinematic look

# Depth of Field
sliders.depthOfField=0.0:0.0:1.0:0.1
option.depthOfField.comment=Depth of field effect (0.0 = disabled)

# Chromatic Aberration
sliders.chromaticAberration=0.0:0.0:0.1:0.01
option.chromaticAberration.comment=Chromatic aberration effect

##############################################################################
# TEXTURE SETTINGS
##############################################################################

screen.texture=<#FFD700>━━━ TEXTURE SETTINGS ━━━

# Normal Map Detail
sliders.normalMapDetail=1.0:0.5:2.0:0.1
option.normalMapDetail.comment=Normal mapping detail level

# PBR Material Strength
sliders.pbrStrength=1.0:0.5:2.0:0.1
option.pbrStrength.comment=PBR material effect strength

##############################################################################
# WEATHER EFFECTS
##############################################################################

screen.weather=<#FFD700>━━━ WEATHER EFFECTS ━━━

# Thunder Lightning
option.thunderLightning=true
option.thunderLightning.comment=Enable realistic thunder lightning effects

# Storm Darkening
sliders.stormDarkening=0.7:0.3:1.0:0.1
option.stormDarkening.comment=Sky darkening during storms

# Wind Effect
option.windEffect=true
option.windEffect.comment=Enable wind effect on vegetation

##############################################################################
# DEBUG OPTIONS
##############################################################################

screen.debug=<#FFD700>━━━ DEBUG OPTIONS ━━━

option.debugShadows=false
option.debugShadows.comment=Visualize shadow map

option.debugNormals=false
option.debugNormals.comment=Visualize surface normals

option.debugAO=false
option.debugAO.comment=Visualize ambient occlusion
